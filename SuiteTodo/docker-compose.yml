# Dev-only SQL for SuiteTodo (Phase 6). Password must match template.appsettings.Development.json.
services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "EggShell_Dev_123!"
    ports:
      - "1433:1433"
    volumes:
      - todo-sql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "EggShell_Dev_123!" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

volumes:
  todo-sql-data:
